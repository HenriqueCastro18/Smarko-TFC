{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smarko{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="{% static 'Smarko_App/base.css' %}">
    
    {% block extra_head %}{% endblock %}
</head>
<body>

    <header role="banner">
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold tracking-tight" href="/">SMARKO</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <div class="ms-auto d-flex align-items-center gap-3 mt-3 mt-lg-0">
                        {% if user.is_authenticated %}
                            <span class="text-light small"><i class="bi bi-person-circle"></i> {{ user.username }}</span>
                            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm rounded-pill px-3">Sair</a>
                        {% else %}
                            <a href="{% url 'login' %}" class="btn btn-link text-light text-decoration-none small">Entrar</a>
                            <a href="{% url 'register' %}" class="btn btn-light btn-sm rounded-pill px-4 fw-bold">Começar</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-content" class="animate__animated animate__fadeIn">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
