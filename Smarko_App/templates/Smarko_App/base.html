{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smarko{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="{% static 'Smarko_App/base.css' %}">
    
    {% block extra_head %}{% endblock %}
</head>
<body>

    <header role="banner">
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold tracking-tight" href="/">SMARKO</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <div class="ms-auto d-flex align-items-center gap-3 mt-3 mt-lg-0">
                        
                        {% if request.session.uid %}
                            <span class="text-light small fw-bold">
                                <i class="bi bi-person-circle me-1"></i> Olá, {{ request.session.username }}
                            </span>
                            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm rounded-pill px-3 fw-bold">
                                Sair <i class="bi bi-box-arrow-right ms-1"></i>
                            </a>
                        {% else %}
                            <a href="{% url 'login' %}" class="btn btn-link text-light text-decoration-none small fw-semibold">Entrar</a>
                            <a href="{% url 'register' %}" class="btn btn-light btn-sm rounded-pill px-4 fw-bold">Começar</a>
                        {% endif %}
                        
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-content" class="animate__animated animate__fadeIn">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% if request.session.uid %}
    <script>
        const TIMEOUT_DURATION = 120000; // 2 minutos para deslogar (120.000 ms)
        const PING_COOLDOWN = 30000;     // Evita spam: só manda ping para o servidor a cada 30 segundos
        
        let inactivityTimer;
        let lastPingTime = 0;

        function logoutUser() {
            // Redireciona para a rota de logout quando o tempo acabar
            window.location.href = "{% url 'logout' %}";
        }

        function pingServer() {
            const now = Date.now();
            // Só faz o request ao backend se já se passaram 30 segundos desde o último
            if (now - lastPingTime > PING_COOLDOWN) {
                fetch("{% url 'ping' %}")
                    .then(response => {
                        if (response.status === 401) {
                            // Se a sessão expirou no backend, força o logout no frontend
                            logoutUser(); 
                        }
                    })
                    .catch(err => console.log('Erro de conexão ao verificar sessão.'));
                lastPingTime = now;
            }
        }

        function handleActivity() {
            // 1. Zera o cronômetro visual de 2 minutos do frontend
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(logoutUser, TIMEOUT_DURATION);

            // 2. Avisa o backend que o usuário está vivo
            pingServer();
        }

        // Lista de eventos que indicam que o usuário está mexendo no site (mouse, teclado, touch)
        const activityEvents = ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart'];

        // Adiciona um listener para cada um desses eventos na página inteira
        activityEvents.forEach(evt => {
            document.addEventListener(evt, handleActivity, { passive: true });
        });

        // Inicia o cronômetro pela primeira vez assim que a página carrega
        handleActivity();
    </script>
    {% endif %}
    </body>
</html>
