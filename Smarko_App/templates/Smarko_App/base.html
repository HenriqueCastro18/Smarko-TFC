{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smarko{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary-dark: #1a182e;
            --accent-color: #4e44e7;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            background-color: #f4f7f6; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--primary-dark);
        }

        /* Navbar com desfoque (Glassmorphism) */
        .navbar-custom {
            background: rgba(26, 24, 46, 0.95);
            backdrop-filter: blur(10px);
            transition: var(--transition-smooth);
        }

        /* Cards Estilizados */
        .card-animate {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: var(--transition-smooth);
        }

        .card-animate:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Botões com Feedback Visual */
        .btn-custom {
            background-color: var(--primary-dark);
            color: white;
            border-radius: 12px;
            padding: 12px 25px;
            border: none;
            transition: var(--transition-smooth);
        }

        .btn-custom:hover {
            background-color: var(--accent-color);
            color: white;
            transform: scale(1.02);
        }

        /* Responsividade para o container do projeto */
        .cidade-page-container {
            margin: 20px auto;
            max-width: 1200px;
            padding: 0 15px;
        }

        /* Esconde elementos para animação inicial */
        .reveal { opacity: 0; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <header role="banner">
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold tracking-tight" href="/">SMARKO</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <div class="ms-auto d-flex align-items-center gap-3 mt-3 mt-lg-0">
                        {% if user.is_authenticated %}
                            <span class="text-light small"><i class="bi bi-person-circle"></i> {{ user.username }}</span>
                            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm rounded-pill px-3">Sair</a>
                        {% else %}
                            <a href="{% url 'login' %}" class="btn btn-link text-light text-decoration-none small">Entrar</a>
                            <a href="{% url 'register' %}" class="btn btn-light btn-sm rounded-pill px-4 fw-bold">Começar</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-content" class="animate__animated animate__fadeIn">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
