
{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smarko</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'Smarko_App/style.css' %}">
</head>
<body class="bg-light">

<div class="container">
    <div class="row vh-100 align-items-center justify-content-center">
        <div class="col-10 col-sm-8 col-md-6 col-lg-4">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4 fw-bold" style="color: #1a182e;">Smarko</h2>
                    
                    <form method="post">
                        {% csrf_token %} <div class="mb-3">
                            <label for="username" class="form-label">Usuário</label>
                            <input type="text" name="username" id="username" class="form-control" placeholder="Digite seu usuário">
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Senha</label>
                            <input type="password" name="password" id="password" class="form-control" placeholder="********">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" style="background-color: #1a182e; border: none;">
                                Entrar
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <small class="text-muted">Esqueceu a senha?</small>
                         <p class="small mb-0">Já tem uma conta? <a href="/registrar" style="color: #1a182e; font-weight: bold; text-decoration: none;">Faça registro</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
