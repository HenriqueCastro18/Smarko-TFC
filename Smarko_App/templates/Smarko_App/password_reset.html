{% extends 'Smarko_App/base.html' %}

{% block title %}Recuperar Senia | Smarko{% endblock %}

{% block content %}
<section class="container">
    <div class="row vh-100 align-items-center justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <article class="card card-animate p-4 p-md-5 animate__animated animate__fadeInUp text-center">
                <div class="mb-3">
                    <div class="icon-circle bg-warning bg-opacity-10 d-inline-flex p-3 rounded-circle">
                        <i class="bi bi-shield-exclamation text-warning" style="font-size: 2.5rem;"></i>
                    </div>
                </div>
                
                <h2 class="h4 fw-bold mb-3">Problemas ao entrar?</h2>
                <p class="text-muted small mb-4">Introduza o seu e-mail e enviaremos um link para recuperar o acesso à sua conta.</p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="form-floating mb-4 text-start">
                        <input type="email" name="email" class="form-control rounded-3" id="resetEmail" placeholder="nome@exemplo.com" required>
                        <label for="resetEmail">E-mail de registo</label>
                    </div>
                    
                    <button type="submit" class="btn btn-custom w-100 fw-bold mb-3">
                        Enviar Link de Recuperação
                    </button>
                </form>

                <a href="{% url 'login' %}" class="btn btn-link btn-sm text-decoration-none text-muted">
                    <i class="bi bi-arrow-left me-1"></i> Voltar ao login
                </a>
            </article>
        </div>
    </div>
</section>
{% endblock %}
