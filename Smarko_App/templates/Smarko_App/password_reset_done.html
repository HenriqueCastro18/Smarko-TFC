{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Alterada | Smarko</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'Smarko_App/style.css' %}">
</head>
<body class="bg-light">

<div class="container">
    <div class="row vh-100 align-items-center justify-content-center">
        <div class="col-10 col-sm-8 col-md-6 col-lg-4">
            <div class="card shadow border-0 p-5 text-center">
                <div class="mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#28a745" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                      <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                    </svg>
                </div>
                <h2 class="fw-bold mb-3" style="color: #1a182e;">Sucesso!</h2>
                <p class="text-muted mb-4">Sua senha foi redefinida com segurança. Você já pode acessar sua conta novamente.</p>
                
                <div class="d-grid">
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg" style="background-color: #1a182e; border: none;">
                        Fazer Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
