{% extends 'Smarko_App/base.html' %}

{% block title %}Criar Conta | Smarko{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
            <article class="card card-animate p-4 p-md-5 animate__animated animate__zoomIn">
                <header class="text-center mb-4">
                    <div class="icon-circle bg-light d-inline-flex p-3 rounded-circle mb-3">
                        <i class="bi bi-shield-lock-fill text-primary" style="font-size: 2rem;"></i>
                    </div>
                    <h1 class="h3 fw-bold">Crie sua conta</h1>
                    <p class="text-muted small">Segurança Bcrypt ativa por padrão.</p>
                </header>

                <form method="POST" novalidate>
                    {% csrf_token %}
                    <div class="form-floating mb-3">
                        <input type="text" name="usuario" id="userField" class="form-control rounded-3" placeholder="Usuário" required>
                        <label for="userField">Nome de Usuário</label>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="email" name="email" id="emailField" class="form-control rounded-3" placeholder="email@exemplo.com" required>
                        <label for="emailField">E-mail</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" name="senha" id="passField" class="form-control rounded-3" placeholder="Senha" required>
                        <label for="passField">Senha</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" name="confirmacao" id="confirmField" class="form-control rounded-3" placeholder="Confirme" required>
                        <label for="confirmField">Confirmar Senha</label>
                    </div>

                    <button type="submit" class="btn btn-custom w-100 fw-bold shadow-sm">
                        Finalizar Cadastro <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </form>

                <footer class="text-center mt-4">
                    <p class="small text-muted">Já é membro? <a href="{% url 'login' %}" class="fw-bold text-primary">Acesse aqui</a></p>
                </footer>
            </article>
        </div>
    </div>
</section>
{% endblock %}
