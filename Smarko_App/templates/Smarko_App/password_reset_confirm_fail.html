{% extends 'Smarko_App/base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; background-color: #f4f4f9;">
    <div style="background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%;">
        
        <div style="width: 80px; height: 80px; background-color: #ffeded; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 10px;">
            <span style="color: #ff4d4d; font-size: 50px; font-weight: bold; line-height: 1;">&times;</span>
        </div>

        <h2 style="color: #1a182e; margin-bottom: 10px; font-size: 24px;">Link Expirado</h2>
        <p style="color: #666; font-size: 16px; line-height: 1.5; margin-bottom: 30px;">
            Este link de redefinição de senha não é mais válido ou já foi utilizado.
        </p>

        <a href="{% url 'reset_password' %}" 
           style="background-color: #1a182e; color: #fff; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; display: block; transition: 0.3s;">
            Solicitar Novo Link
        </a>
    </div>
</div>
{% endblock %}
