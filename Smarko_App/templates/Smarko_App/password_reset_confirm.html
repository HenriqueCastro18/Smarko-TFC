{% extends 'Smarko_App/base.html' %}

{% block title %}Definir Nova Senha | Smarko{% endblock %}

{% block content %}
<section class="container">
    <div class="row vh-100 align-items-center justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <article class="card card-animate p-4 p-md-5 animate__animated animate__zoomIn">
                <header class="text-center mb-4">
                    <h2 class="h4 fw-bold">Nova Senha</h2>
                    <p class="text-muted small">Crie uma senha forte para sua segurança.</p>
                </header>

                <form method="POST">
                    {% csrf_token %}
                    <div class="django-form-custom">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-custom w-100 fw-bold mt-3">
                        Atualizar Senha <i class="bi bi-check2-circle ms-2"></i>
                    </button>
                </form>
            </article>
        </div>
    </div>
</section>

<style>
    /* Estilização para os campos gerados automaticamente pelo Django */
    .django-form-custom p { margin-bottom: 1.2rem; }
    .django-form-custom label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: var(--primary-dark); }
    .django-form-custom input { 
        width: 100%; 
        padding: 0.75rem 1rem; 
        border: 1px solid #dee2e6; 
        border-radius: 12px; 
        transition: var(--transition-smooth);
    }
    .django-form-custom input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(78, 68, 231, 0.1); }
    .django-form-custom .helptext { display: block; font-size: 0.7rem; color: #6c757d; margin-top: 4px; }
</style>
{% endblock %}
